<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Three.js — Orthographic Camera (Mini Example)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; background: #1b1b1b; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; left: 10px; bottom: 10px;
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 10px; border-radius: 8px;
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; user-select: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">Orthographic camera • Resize the window to see the frustum update</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.154.0/build/three.module.js';

    // ----------------------------------------
    // 1) Renderer
    // ----------------------------------------
    const container = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // ----------------------------------------
    // 2) Scene
    // ----------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    // ----------------------------------------
    // 3) Orthographic Camera
    //    We'll compute proper left/right/top/bottom on resize.
    // ----------------------------------------
    // Initial placeholder values (they will be overwritten on first resize).
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -1000, 1000);
    camera.position.set(0, 2.4, 6.5); // pull back and up a bit
    camera.lookAt(0, 0, 0);
    camera.zoom = 1; // feel free to adjust zoom
    camera.updateProjectionMatrix();

    // Keep a constant vertical span in world units.
    // Increase for a larger "zoomed-out" view; decrease for closer view.
    const FRUSTUM_SIZE = 12;

    // ----------------------------------------
    // 4) Content (grid + cube)
    // ----------------------------------------
    // Grid helps visualize scale
    const grid = new THREE.GridHelper(18, 36, 0x666666, 0x333333);
    grid.position.y = -2.2;
    scene.add(grid);

    // A simple cube
    const boxGeo = new THREE.BoxGeometry(2, 2, 2);
    const boxMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, wireframe: false });
    const cube = new THREE.Mesh(boxGeo, boxMat);
    scene.add(cube);

            // ===== NEW: crisp edge overlay for the cube =====
        // Create edges from the cube's geometry
        const cubeEdgeGeom = new THREE.EdgesGeometry(cube.geometry, /*thresholdAngle*/ 1);
        // White line material
        const cubeEdgeMat  = new THREE.LineBasicMaterial({ color: 0xffffff });
        const cubeEdges    = new THREE.LineSegments(cubeEdgeGeom, cubeEdgeMat);

        // Make edges render clearly on top:
        // Option A (simplest): disable depth test so the lines aren't hidden by faces.
        cubeEdges.material.depthTest = false;
        // Option B (alternative): keep depthTest true and push render order above the cube.
        // cubeEdges.renderOrder = 999;

        // Attach edges to the cube so it follows all transforms automatically
        cube.add(cubeEdges);
        // ===== END NEW =====

    // ----------------------------------------
    // 5) Resize logic — update renderer and Ortho frustum
    // ----------------------------------------
    function onResize() {
      const { clientWidth: w, clientHeight: h } = container;

      // Resize the renderer
      renderer.setSize(w, h, false);

      // Compute aspect and set orthographic bounds.
      // We keep vertical size fixed at FRUSTUM_SIZE; horizontal grows/shrinks with aspect.
      const aspect = w / h;
      camera.left   = - (FRUSTUM_SIZE * aspect) / 2;
      camera.right  =   (FRUSTUM_SIZE * aspect) / 2;
      camera.top    =   FRUSTUM_SIZE / 2;
      camera.bottom = - FRUSTUM_SIZE / 2;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', onResize);
    onResize(); // initialize at startup

    // ----------------------------------------
    // 6) Animation loop (simple rotation so you can see changes)
    //    Note: Orthographic has no perspective distortion, so the cube won't "shrink" with distance.
    // ----------------------------------------
    function animate() {
      requestAnimationFrame(animate);

      cube.rotation.y += 0.01;
      cube.rotation.x += 0.005;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
