<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Three.js — Antialias vs No Antialias (Commented)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* Basic page reset and background */
      html, body { margin: 0; height: 100%; background: #dad0d0; overflow: hidden; }

      /* Simple top bar so the page looks like a demo */
      #navbar {
        position: fixed; top: 0; left: 0; right: 0; height: 56px;
        display: flex; align-items: center; gap: 12px; padding: 0 16px;
        background: #554a92; color: #fff; font: 600 20px/1.2 system-ui, Segoe UI, Roboto, Arial, sans-serif;
        border-bottom: 10px solid rgba(175, 5, 5, 0.89);
        z-index: 10;
      }

      /* Container that holds two panes side-by-side */
      #wrap {
        position: absolute; left: 0; right: 0; top: 56px; bottom: 0; display: flex;
      }

      /* Each pane will hold one renderer (one canvas) */
      .pane {
        position: relative; flex: 1 1 50%; display: flex; align-items: stretch; justify-content: stretch;
        border-left: 5px solid rgba(65, 28, 151, 0.08);
      }
      .pane:first-child { border-left: none; }

      /* Two WebGL canvases will be auto-inserted into the panes */
      canvas { display: block; width: 100%; height: 100%; }

      /* Labels that float over each pane */
      .label {
        position: absolute; top: 20px; left: 10px;
        padding: 6px 10px; border-radius: 6px;
        background: rgba(0,0,0,0.6); color: #fff; font: 20px/1.3 system-ui;
        pointer-events: none; user-select: none; z-index: 5;
      }

      /* Small HUD with keyboard help */
      .hud {
        position: fixed; bottom: 10px; left: 10px; z-index: 12;
        background: rgba(0,0,0,0.6); color: #fff; padding: 8px 10px; border-radius: 10px; font: 20px/1.3 system-ui;
      }
      .kbd { padding: 1px 6px; border: 1px solid rgba(255,255,255,0.35); border-radius: 4px; font-weight: 600; }
    </style>
  </head>
  <body>
    <!-- Simple title bar -->
    <div id="navbar">
      <span>Three.js — Antialias Comparison</span>
    </div>

    <!-- Two side-by-side panes for two different renderers -->
    <div id="wrap">
      <div class="pane" id="pane-aa">
        <div class="label">antialias: <b>true</b></div>
      </div>
      <div class="pane" id="pane-noaa">
        <div class="label">antialias: <b>false</b></div>
      </div>
    </div>

    <!-- Quick help: keys to interact -->
    <div class="hud">Keys: <span class="kbd">R</span> reset rotation • <span class="kbd">W</span> toggle wireframe • Rotates automatically</div>

    <!-- Use ES modules so we can import Three.js directly from a CDN -->
    <script type="module">
      // Import Three.js (module build) from the official unpkg CDN
      import * as THREE from 'https://unpkg.com/three@0.154.0/build/three.module.js';

      // -----------------------------
      // Shared scene factory
      // -----------------------------
      // We create *identical* content for both panes, so the only variable is antialias on/off.
      function createSceneContent() {
        // Create a new scene with a neutral dark background
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // Group all demo meshes so we can rotate them together
        const group = new THREE.Group();

        // 1) A red cube with a few segments (shows edges clearly)
        //    Subdivisions (2,2,2) add more lines for the wireframe toggle.
        const boxGeo = new THREE.BoxGeometry(1.6, 1.6, 1.6, 2, 2, 2);
        const boxMat = new THREE.MeshBasicMaterial({ color: 0xff4444, wireframe: false });
        const cube = new THREE.Mesh(boxGeo, boxMat);
        cube.position.set(-1.2, 0.0, 0.0);
        group.add(cube);

        // 2) A torus knot with many segments (thin, curvy edges amplify aliasing)
        const tkGeo = new THREE.TorusKnotGeometry(0.8, 0.25, 160, 24);
        const tkMat = new THREE.MeshBasicMaterial({ color: 0x44ff88, wireframe: false });
        const knot = new THREE.Mesh(tkGeo, tkMat);
        knot.position.set(1.2, 0.0, 0.0);
        group.add(knot);

        // 3) A ground grid with many diagonal lines (aliasing becomes obvious while rotating)
        const grid = new THREE.GridHelper(18, 36, 0x666666, 0x333333);
        grid.position.y = -2.2;


        // Add the content group to the scene
        scene.add(group);
        // Add ground grid to the scene
        scene.add(grid);


        // Return everything we may want to animate or tweak later
        return { scene, cube, knot, boxMat, tkMat, group };
      }

      // -----------------------------
      // Viewer factory
      // -----------------------------
      // Each viewer owns:
      // - a renderer (with antialias on/off)
      // - a camera
      // - its own copy of the scene content (so materials can be toggled independently)
      function createViewer(container, useAA) {
        // Create the renderer. The only difference between the two panes is this 'antialias' flag.
        const renderer = new THREE.WebGLRenderer({ antialias: useAA });

        // Render at device pixel ratio (helps sharpness; makes AA look even better on HiDPI)
        // Tip: set to 1 to exaggerate aliasing on the right side for demonstration.
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Insert the renderer's <canvas> into the target container
        container.appendChild(renderer.domElement);

        // Create a perspective camera with a reasonable FOV and clipping planes
        const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
        camera.position.set(0, 2.4, 6.5);
        camera.lookAt(0, 0, 0);

        // Build the scene content for this viewer
        const { scene, cube, knot, boxMat, tkMat, group } = createSceneContent();

        return { renderer, camera, scene, cube, knot, boxMat, tkMat, group, container };
      }

      // Grab the left/right panes from the DOM
      const paneAA = document.getElementById('pane-aa');
      const paneNoAA = document.getElementById('pane-noaa');

      // Create two viewers: one with antialiasing enabled, one disabled
      const viewAA   = createViewer(paneAA,   true);
      const viewNoAA = createViewer(paneNoAA, false);

      // -----------------------------
      // Resize handling
      // -----------------------------
      // Each pane can be resized by CSS (the page is responsive), so we compute the correct
      // canvas size and camera aspect ratio from each pane’s current bounding box.
      function resizeView(view) {
        const rect = view.container.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        // 'false' prevents style-based scaling and keeps internal drawing buffer in sync
        view.renderer.setSize(w, h, false);
        view.camera.aspect = w / h;
        view.camera.updateProjectionMatrix();
      }

      // Global resize handler calls resize for both panes
      function onResize() {
        resizeView(viewAA);
        resizeView(viewNoAA);
      }
      window.addEventListener('resize', onResize);
      onResize(); // run once at startup

      // -----------------------------
      // Interaction: wireframe toggle & rotation reset
      // -----------------------------
      let wireframe = false;

      // Apply wireframe to the materials in both views
      function setWireframe(value) {
        wireframe = value;
        viewAA.boxMat.wireframe   = wireframe;
        viewAA.tkMat.wireframe    = wireframe;
        viewNoAA.boxMat.wireframe = wireframe;
        viewNoAA.tkMat.wireframe  = wireframe;
      }

      // Set all rotations back to zero (for both panes)
      function resetRotation() {
        [viewAA, viewNoAA].forEach(v => {
          v.group.rotation.set(0, 0, 0);
          v.cube.rotation.set(0, 0, 0);
          v.knot.rotation.set(0, 0, 0);
        });
      }


      
    // NEW: rotation toggle flag
    let rotationEnabled = true;

      // NEW: define StopRotation() (here: toggle on/off)
      function StopRotation() {
        rotationEnabled = !rotationEnabled;
        }

       
    function startRotation() { rotationEnabled = true; }
    function stopRotation()  { rotationEnabled = false; }
 


      // Keyboard shortcuts:
      // W — toggle wireframe
      // R — reset rotation
      // S — stop/resume rotation
      window.addEventListener('keydown', (e) => {
        if (e.key === 'w' || e.key === 'W') setWireframe(!wireframe);
        if (e.key === 'r' || e.key === 'R') resetRotation();
        if (e.key === 's' || e.key === 'S') StopRotation();
      });

      // -----------------------------
      // Animation loop
      // -----------------------------
      // We render BOTH viewers every frame. The content rotates slowly so aliasing artifacts
      // (jaggies and shimmer) are easy to spot on the non-antialiased pane.
      function animate() {
        requestAnimationFrame(animate);

        // Animate both copies of the scene identically (but only if rotation is enabled)
        [viewAA, viewNoAA].forEach(v => {
            
        if (rotationEnabled) {

          // Rotate the group (affects cube + knot together)
          v.group.rotation.y += 0.01;
          // Also rotate the knot itself a bit for extra motion
          v.knot.rotation.x  += 0.013;
          v.knot.rotation.z  += 0.007;
        
        }

          // Render this viewer’s scene with its own camera
          v.renderer.render(v.scene, v.camera);
        });

        }
      animate();
    </script>
  </body>
</html>
