<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Three.js — 4 Cameras: Perspective • Stereo • Ortho • CubeCamera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* Page reset */
      html, body { margin: 0; height: 100%; background: #dad0d0; overflow: hidden; }

      /* Top navbar */
      #navbar {
        position: fixed; top: 0; left: 0; right: 0; height: 56px;
        display: flex; align-items: center; gap: 12px; padding: 0 16px;
        background: #554a92; color: #fff; font: 600 18px/1.2 system-ui, Segoe UI, Roboto, Arial, sans-serif;
        border-bottom: 8px solid rgba(175, 5, 5, 0.89);
        z-index: 10;
      }

      /* Strict 2×2 quarters using CSS Grid */
      #wrap {
        position: absolute; left: 0; right: 0; top: 56px; bottom: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;   /* 2 columns */
        grid-template-rows: 1fr 1fr;      /* 2 rows    */
        gap: 0;                           /* seamless quarters */
      }

      .pane {
        position: relative;
        display: flex; align-items: stretch; justify-content: stretch;
        /* subtle inner borders to visualize quarters */
        box-shadow: inset 0 0 0 4px rgba(65, 28, 151, 0.08);
      }

      canvas { display: block; width: 100%; height: 100%; }

      .label {
        position: absolute; top: 14px; left: 10px;
        padding: 6px 10px; border-radius: 6px;
        background: rgba(0,0,0,0.6); color: #fff; font: 14px/1.3 system-ui;
        pointer-events: none; user-select: none; z-index: 5;
      }

      .hud {
        position: fixed; bottom: 10px; left: 10px; z-index: 12;
        background: rgba(0,0,0,0.6); color: #fff; padding: 8px 10px;
        border-radius: 10px; font: 14px/1.3 system-ui;
      }
      .kbd { padding: 1px 6px; border: 1px solid rgba(255,255,255,0.35);
             border-radius: 4px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="navbar">
      <span>Three.js — 4 Cameras: Perspective • Stereo • Orthographic • CubeCamera</span>
    </div>

    <div id="wrap">
      <div class="pane" id="pane-persp"><div class="label">Camera: <b>Perspective</b></div></div>
      <div class="pane" id="pane-stereo"><div class="label">Camera: <b>Stereo</b> (split L/R)</div></div>
      <div class="pane" id="pane-ortho"><div class="label">Camera: <b>Orthographic</b></div></div>
      <div class="pane" id="pane-cube"><div class="label">Camera: <b>CubeCamera</b> (live env map)</div></div>
    </div>

    <div class="hud">
      Keys:
      <span class="kbd">W</span> wireframe •
      <span class="kbd">R</span> reset •
      <span class="kbd">S</span> toggle rotate •
      <span class="kbd">O</span> start •
      <span class="kbd">P</span> stop
    </div>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.154.0/build/three.module.js';

      // -----------------------------
      // Shared scene factory (cube + torus knot + grid)
      // -----------------------------
      function createSceneContent() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const group = new THREE.Group();

        // Red cube (slightly segmented for nicer wireframe)
        const boxGeo = new THREE.BoxGeometry(1.6, 1.6, 1.6, 2, 2, 2);
        const boxMat = new THREE.MeshBasicMaterial({ color: 0xff4444, wireframe: false });
        const cube = new THREE.Mesh(boxGeo, boxMat);
        cube.position.set(-1.2, 0.0, 0.0);
        group.add(cube);

        // ===== NEW: crisp edge overlay for the cube =====
        // Create edges from the cube's geometry
        const cubeEdgeGeom = new THREE.EdgesGeometry(cube.geometry, /*thresholdAngle*/ 1);
        // White line material
        const cubeEdgeMat  = new THREE.LineBasicMaterial({ color: 0xffffff });
        const cubeEdges    = new THREE.LineSegments(cubeEdgeGeom, cubeEdgeMat);

        // Make edges render clearly on top:
        // Option A (simplest): disable depth test so the lines aren't hidden by faces.
        cubeEdges.material.depthTest = false;
        // Option B (alternative): keep depthTest true and push render order above the cube.
        // cubeEdges.renderOrder = 999;

        // Attach edges to the cube so it follows all transforms automatically
        cube.add(cubeEdges);
        // ===== END NEW =====

        // Green torus knot
        const tkGeo = new THREE.TorusKnotGeometry(0.8, 0.25, 160, 24);
        const tkMat = new THREE.MeshBasicMaterial({ color: 0x44ff88, wireframe: false });
        const knot = new THREE.Mesh(tkGeo, tkMat);
        knot.position.set(1.2, 0.0, 0.0);
        group.add(knot);

        // Ground grid
        const grid = new THREE.GridHelper(18, 36, 0x666666, 0x333333);
        grid.position.y = -2.2;

        scene.add(group);
        scene.add(grid);

        return { scene, cube, knot, boxMat, tkMat, group, grid };
      }

      // -----------------------------
      // View builder per pane
      // -----------------------------
      function createView(container, cameraType) {
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const { scene, cube, knot, boxMat, tkMat, group } = createSceneContent();

        const view = {
          container, renderer, scene, cube, knot, boxMat, tkMat, group,
          cameraType,
          camera: null,
          // Stereo support
          baseCamera: null, stereo: null,
          // Ortho support
          frustumSize: 12,
          // CubeCamera support
          cubeRT: null, cubeCam: null, envSphere: null, envMat: null
        };

        if (cameraType === 'perspective') {
          const cam = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
          cam.position.set(0, 2.4, 6.5);
          cam.lookAt(0, 0, 0);
          view.camera = cam;

        } else if (cameraType === 'stereo') {
          // Base camera + StereoCamera. Render L/R into half-width viewports.
          const base = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
          base.position.set(0, 2.4, 6.5);
          base.lookAt(0, 0, 0);
          const stereo = new THREE.StereoCamera();
          view.baseCamera = base;
          view.stereo = stereo;
          view.camera = base; // just for consistent interface

        } else if (cameraType === 'orthographic') {
          // Proper left/right/top/bottom set on resize.
          const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
          cam.position.set(0, 2.4, 6.5);
          cam.lookAt(0, 0, 0);
          cam.zoom = 1;
          cam.updateProjectionMatrix();
          view.camera = cam;

        } else if (cameraType === 'cube') {
          // Normal perspective camera for the viewer...
          const cam = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
          cam.position.set(0, 2.4, 6.5);
          cam.lookAt(0, 0, 0);
          view.camera = cam;

          // ...plus a CubeCamera to capture the environment for reflections.
          const cubeRT = new THREE.WebGLCubeRenderTarget(256, {
            format: THREE.RGBAFormat,
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter
          });
          const cubeCam = new THREE.CubeCamera(0.1, 1000, cubeRT);

          // Reflective sphere using the cube render target as envMap
          const envGeo = new THREE.SphereGeometry(1.1, 48, 32);
          const envMat = new THREE.MeshBasicMaterial({ envMap: cubeRT.texture, color: 0xffffff, wireframe: false });
          const envSphere = new THREE.Mesh(envGeo, envMat);
          envSphere.position.set(0, 0, 0);
          view.scene.add(envSphere);

          // Place cube camera at the sphere's position to capture surroundings
          cubeCam.position.copy(envSphere.position);
          view.scene.add(cubeCam);

          view.cubeRT = cubeRT;
          view.cubeCam = cubeCam;
          view.envSphere = envSphere;
          view.envMat = envMat; // wireframe toggle support
        }

        return view;
      }

      // Create the four views (one per quarter)
      const viewPersp  = createView(document.getElementById('pane-persp'),  'perspective');
      const viewStereo = createView(document.getElementById('pane-stereo'), 'stereo');
      const viewOrtho  = createView(document.getElementById('pane-ortho'),  'orthographic');
      const viewCube   = createView(document.getElementById('pane-cube'),   'cube');

      const views = [viewPersp, viewStereo, viewOrtho, viewCube];

      // -----------------------------
      // Resize handling (per view)
      // -----------------------------
      function resizeView(v) {
        const rect = v.container.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        v.renderer.setSize(w, h, false);

        if (v.cameraType === 'perspective') {
          v.camera.aspect = w / h;
          v.camera.updateProjectionMatrix();

        } else if (v.cameraType === 'stereo') {
          // Each eye sees a half-width viewport, so use halfWidth/height as aspect.
          const halfAspect = (w / 2) / h;
          v.baseCamera.aspect = halfAspect;
          v.baseCamera.updateProjectionMatrix();
          v.stereo.aspect = halfAspect; // used by StereoCamera to compute L/R cameras

        } else if (v.cameraType === 'orthographic') {
          // Keep vertical size constant, scale horizontal by aspect.
          const aspect = w / h;
          const frustumSize = v.frustumSize;
          v.camera.left   = - (frustumSize * aspect) / 2;
          v.camera.right  =   (frustumSize * aspect) / 2;
          v.camera.top    =   frustumSize / 2;
          v.camera.bottom = - frustumSize / 2;
          v.camera.updateProjectionMatrix();

        } else if (v.cameraType === 'cube') {
          v.camera.aspect = w / h;
          v.camera.updateProjectionMatrix();
        }
      }

      function onResize() { views.forEach(resizeView); }
      window.addEventListener('resize', onResize);
      onResize(); // initial layout

      // -----------------------------
      // Interaction / controls
      // -----------------------------
      let rotationEnabled = true;
      let wireframe = false;

      function setWireframe(value) {
        wireframe = value;
        views.forEach(v => {
          if (v.boxMat) v.boxMat.wireframe = wireframe;
          if (v.tkMat)  v.tkMat.wireframe  = wireframe;
          if (v.envMat) v.envMat.wireframe = wireframe; // for cube-camera pane
        });
      }

      function resetRotation() {
        views.forEach(v => {
          v.group.rotation.set(0, 0, 0);
          v.cube.rotation.set(0, 0, 0);
          v.knot.rotation.set(0, 0, 0);
        });
      }
      function toggleRotation(){ rotationEnabled = !rotationEnabled; }
      function startRotation() { rotationEnabled = true;  }
      function stopRotation()  { rotationEnabled = false; }

      window.addEventListener('keydown', (e) => {
        if (e.key === 'w' || e.key === 'W') setWireframe(!wireframe);
        if (e.key === 'r' || e.key === 'R') resetRotation();
        if (e.key === 's' || e.key === 'S') toggleRotation();
        if (e.key === 'o' || e.key === 'O') startRotation();
        if (e.key === 'p' || e.key === 'P') stopRotation();
      });

      // -----------------------------
      // Rendering helpers
      // -----------------------------
      function renderPerspective(v) {
        v.renderer.render(v.scene, v.camera);
      }

      function renderStereo(v) {
        const rect = v.container.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        const halfW = Math.floor(w / 2);

        // Prepare stereo cameras from base camera
        v.stereo.update(v.baseCamera);

        // Confine draw to halves via scissor test
        v.renderer.setScissorTest(true);

        // Left eye
        v.renderer.setViewport(0, 0, halfW, h);
        v.renderer.setScissor(0, 0, halfW, h);
        v.renderer.render(v.scene, v.stereo.cameraL);

        // Right eye
        v.renderer.setViewport(halfW, 0, w - halfW, h);
        v.renderer.setScissor(halfW, 0, w - halfW, h);
        v.renderer.render(v.scene, v.stereo.cameraR);

        v.renderer.setScissorTest(false);
      }

      function renderOrthographic(v) {
        v.renderer.render(v.scene, v.camera);
      }

      function renderCubeCamera(v) {
        // Hide the reflective sphere while capturing to avoid self-capture artifacts
        v.envSphere.visible = false;
        v.cubeCam.update(v.renderer, v.scene);
        v.envSphere.visible = true;

        v.renderer.render(v.scene, v.camera);
      }

      // -----------------------------
      // Animation loop
      // -----------------------------
      function animate() {
        requestAnimationFrame(animate);

        // Rotate shared content in each view
        views.forEach(v => {
          if (rotationEnabled) {
            v.group.rotation.y += 0.01;
            v.knot.rotation.x  += 0.013;
            v.knot.rotation.z  += 0.007;
          }
        });

        // Render each view by type
        renderPerspective(viewPersp);
        renderStereo(viewStereo);
        renderOrthographic(viewOrtho);
        renderCubeCamera(viewCube);
      }
      animate();
    </script>
  </body>
</html>
